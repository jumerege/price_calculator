<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ffd60a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="320" height="100" rx="16" ry="16" fill="#05081f" opacity="0.92"/>
  <rect x="1" y="1" width="318" height="98" rx="15" ry="15" fill="none" stroke="url(#flameGrad)" stroke-width="1.2" opacity="0.6"/>

  <!-- Phoenix bird / flame icon -->
  <!-- Main body flame -->
  <path d="M 52 78 C 44 62 38 50 46 36 C 50 28 56 24 56 24 C 54 34 58 40 62 44 C 64 36 66 26 72 18 C 74 30 70 40 72 50 C 76 42 80 36 86 32 C 82 44 78 52 80 62 C 84 54 90 48 96 46 C 90 56 86 66 86 78 Z"
        fill="url(#flameGrad)" filter="url(#glow)" opacity="0.95"/>
  <!-- Left wing -->
  <path d="M 52 58 C 42 54 32 52 26 46 C 36 46 44 50 52 54 Z"
        fill="#ff6b35" opacity="0.8"/>
  <!-- Right wing -->
  <path d="M 82 52 C 92 46 102 42 110 44 C 100 48 92 52 84 58 Z"
        fill="#00d4ff" opacity="0.8"/>
  <!-- Tail feathers -->
  <path d="M 60 78 C 54 86 48 90 42 94" stroke="#ff6b35" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 68 78 C 68 88 66 92 64 96" stroke="#ffd60a" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 76 78 C 82 86 88 90 92 94" stroke="#00d4ff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Orbit arc -->
  <ellipse cx="69" cy="58" rx="34" ry="10" fill="none" stroke="#00d4ff" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.4"/>
  <!-- Capsule dot on orbit -->
  <circle cx="92" cy="54" r="3" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>

  <!-- PHOENIX text -->
  <text x="126" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="900"
        letter-spacing="4" fill="url(#textGrad)" filter="url(#glow)">PHOENIX</text>

  <!-- Divider line -->
  <line x1="126" y1="60" x2="306" y2="60" stroke="url(#flameGrad)" stroke-width="0.8" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="127" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="400"
        letter-spacing="3.5" fill="#b0b8c7">PRICING CALCULATOR</text>

  <!-- Dot accent -->
  <circle cx="119" cy="52" r="3.5" fill="#ff6b35" filter="url(#glow)"/>
</svg>
